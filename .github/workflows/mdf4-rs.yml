name: mdf4-rs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TOOLCHAIN: "1.90.0"

jobs:
  # Test with default features (std + can + dbc)
  test-std:
    name: Test (std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features

  # Check alloc only compiles (no_std compatible, tests require std)
  check-alloc:
    name: Check (alloc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Check compilation
        run: cargo check --no-default-features --features alloc

  # Check can feature compiles
  check-can:
    name: Check (can)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Check compilation
        run: cargo check --no-default-features --features "alloc,can"

  # Check dbc feature compiles (alloc-only, no CanDbcLogger)
  check-dbc:
    name: Check (dbc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Check compilation
        run: cargo check --no-default-features --features "alloc,dbc"

  # Clippy linting
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  # Format check
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Documentation
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Line coverage is ~73–74% (library + integration tests, src/ only via ignore
      # regex). A previous --fail-under-lines 80 failed CI for that reason; we
      # report totals only, no gate.
      - name: Code coverage (report summary)
        run: |
          set -euo pipefail
          cargo llvm-cov \
            --all-features \
            --tests \
            --lib \
            --ignore-filename-regex "^(tests|examples|benches)/" \
            --json --summary-only \
            --output-path coverage-summary.json
          echo "Coverage totals (library + integration tests; paths under tests/, examples/, benches/ excluded from report):"
          jq '.data[0].totals | {lines, functions, regions}' coverage-summary.json
          
  # Benchmarks (compile only, don't run)
  benchmark:
    name: Benchmark (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Build benchmarks
        run: cargo bench --no-run --all-features
